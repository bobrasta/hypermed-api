[build]
builder = "nixpacks"

[deploy]
# Caches config/routes, runs migrations, then starts the built-in PHP server.
# Railway gives each service a $PORT — artisan serve binds to it automatically.
startCommand = "php artisan config:cache; php artisan route:cache; php artisan migrate --force; php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/up"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
